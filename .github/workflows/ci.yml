name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore Guardian.sln

      - name: Build
        run: dotnet build Guardian.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Guardian.sln --configuration Release --no-build --verbosity normal
